<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelances</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container mt-5 pt-5">

<h1 class="text-center">Nos Freelances</h1>

<!-- FILTRE -->
<select id="filter" class="form-select w-50 mx-auto my-4">
    <option value="all">Tous</option>
    <option value="dev">Développement</option>
    <option value="design">Design</option>
</select>

<!-- CARTES -->
<div class="row" id="freelanceList">

    <div class="col-md-4 freelancer" data-category="dev">
        <div class="card p-3">
            <h5>Ali Dev</h5>
            <p>Développeur Web</p>
        </div>
    </div>

    <div class="col-md-4 freelancer" data-category="design">
        <div class="card p-3">
            <h5>Sara Design</h5>
            <p>UI/UX Designer</p>
        </div>
    </div>

</div>

</div>

<script src="js/main.js"></script>
</body>
</html>
